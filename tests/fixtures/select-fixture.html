<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OpenClaw Dashboard Plus Select Fixture</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #11131a;
        --bg-elevated: #171a22;
        --input: #1d212b;
        --text: #e8ebf2;
        --text-strong: #ffffff;
        --muted: #9ca3b5;
        --border: #2b3040;
        --border-strong: #3a4153;
        --accent: #6aa6ff;
        --accent-subtle: rgba(106, 166, 255, 0.18);
        --radius-md: 10px;
        --radius-lg: 14px;
        --shadow-lg: 0 18px 42px rgba(0, 0, 0, 0.35);
        font-family: "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(106, 166, 255, 0.12), transparent 28%),
          var(--bg);
        color: var(--text);
      }

      main {
        width: min(680px, calc(100vw - 32px));
        padding: 24px;
        border: 1px solid var(--border);
        border-radius: 18px;
        background: var(--bg-elevated);
        box-shadow: var(--shadow-lg);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 24px;
      }

      p {
        margin: 0 0 20px;
        color: var(--muted);
      }

      .field {
        display: grid;
        gap: 8px;
        margin-top: 18px;
      }

      label {
        font-size: 14px;
        font-weight: 600;
      }

      select {
        width: 100%;
        min-height: 40px;
      }

      .narrow {
        width: 220px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Select Fix Fixture</h1>
      <p>This page exists only to verify that the extension loads select repair styles from the external style bundle.</p>

      <div class="field">
        <label for="theme">Theme preset</label>
        <select id="theme">
          <option value="classic" selected>OpenClaw Classic</option>
          <option value="nebula">Nebula Dark</option>
          <option value="terminal">Terminal Dark</option>
        </select>
      </div>

      <div class="field">
        <label for="language">Language pack</label>
        <select id="language" class="narrow">
          <optgroup label="Built-in">
            <option value="zh-CN" selected>简体中文</option>
            <option value="en">English</option>
          </optgroup>
          <optgroup label="Generated">
            <option value="ja">日本語</option>
            <option value="fr">Français</option>
            <option value="es">Español</option>
          </optgroup>
        </select>
      </div>
    </main>
  </body>
</html>
