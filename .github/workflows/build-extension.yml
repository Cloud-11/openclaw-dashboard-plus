name: Build Extension

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Read plugin version
        id: version
        shell: pwsh
        run: |
          $metadata = Get-Content plugin-metadata.json -Raw | ConvertFrom-Json
          $version = "$($metadata.version)".Trim()
          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "plugin-metadata.json is missing a version."
          }

          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=v$version" >> $env:GITHUB_OUTPUT

      - name: Build extension
        run: node build-extension.mjs

      - name: Package extension zip
        run: node package-extension-zip.mjs

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-dashboard-plus-extension
          path: |
            dist/openclaw-dashboard-plus-extension.zip
            dist/extension
          if-no-files-found: error

      - name: Create version tag
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        shell: pwsh
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          git fetch --tags origin
          $existingTag = (git tag -l $env:RELEASE_TAG | Out-String).Trim()
          if ($existingTag -eq $env:RELEASE_TAG) {
            Write-Host "Tag $env:RELEASE_TAG already exists. Skipping tag creation."
            exit 0
          }

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag $env:RELEASE_TAG
          git push origin $env:RELEASE_TAG

      - name: Wait for release tag propagation
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          for ($attempt = 0; $attempt -lt 20; $attempt++) {
            gh api "repos/$env:GITHUB_REPOSITORY/git/ref/tags/$env:RELEASE_TAG" *> $null
            if ($LASTEXITCODE -eq 0) {
              exit 0
            }

            Start-Sleep -Seconds 2
          }

          throw "Tag $env:RELEASE_TAG was not discoverable on GitHub in time."

      - name: Publish GitHub release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          $existingRelease = gh release view $env:RELEASE_TAG --json isDraft,url 2>$null
          if ($LASTEXITCODE -eq 0) {
            $release = $existingRelease | ConvertFrom-Json
            if (-not $release.isDraft) {
              Write-Host "Release $env:RELEASE_TAG already published at $($release.url)."
              exit 0
            }

            gh release edit $env:RELEASE_TAG --draft=false | Out-Host
            exit 0
          }

          gh release create $env:RELEASE_TAG dist/openclaw-dashboard-plus-extension.zip --verify-tag --draft --title "OpenClaw Dashboard Plus $env:RELEASE_TAG" --generate-notes
          gh release edit $env:RELEASE_TAG --draft=false | Out-Host

  release:
    needs: package
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build extension
        run: node build-extension.mjs

      - name: Package extension zip
        run: node package-extension-zip.mjs

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          $existingRelease = gh release view $env:RELEASE_TAG --json isDraft,url 2>$null
          if ($LASTEXITCODE -eq 0) {
            $release = $existingRelease | ConvertFrom-Json
            if (-not $release.isDraft) {
              Write-Host "Release $env:RELEASE_TAG already published at $($release.url)."
              exit 0
            }

            gh release edit $env:RELEASE_TAG --draft=false | Out-Host
            exit 0
          }

          gh release create $env:RELEASE_TAG dist/openclaw-dashboard-plus-extension.zip --verify-tag --draft --title "OpenClaw Dashboard Plus $env:RELEASE_TAG" --generate-notes
          gh release edit $env:RELEASE_TAG --draft=false | Out-Host
